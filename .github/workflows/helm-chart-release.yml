name: Helm Chart Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (for example 1.0.0)"
        required: true
        type: string

permissions:
  contents: write
  packages: read

concurrency:
  group: helm-chart-release-${{ github.event.release.tag_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-helm-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="${{ inputs.release_tag }}"
          fi

          RELEASE_TAG="$(echo "${RELEASE_TAG}" | xargs)"
          if [ -z "${RELEASE_TAG}" ]; then
            echo "Release tag is required." >&2
            exit 1
          fi
          if [[ "${RELEASE_TAG}" == v* ]]; then
            echo "Release tags must be plain semantic versions without a 'v' prefix (example: 1.0.0)." >&2
            exit 1
          fi
          if ! [[ "${RELEASE_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must be a semantic version (example: 1.0.0 or 1.0.0-rc.1)." >&2
            exit 1
          fi

          REPO_OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          HELM_REPO_URL="https://${REPO_OWNER_LOWER}.github.io/${REPO_NAME}"

          {
            echo "release_tag=${RELEASE_TAG}"
            echo "repo_owner_lower=${REPO_OWNER_LOWER}"
            echo "helm_repo_url=${HELM_REPO_URL}"
          } >> "${GITHUB_OUTPUT}"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Release Image in GHCR
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          REPO_OWNER_LOWER: ${{ steps.meta.outputs.repo_owner_lower }}
        run: |
          set -euo pipefail

          image_ref="ghcr.io/${REPO_OWNER_LOWER}/claude-oauth-proxy:${RELEASE_TAG}"
          max_wait_seconds=1800
          poll_interval_seconds=20
          deadline=$(( $(date +%s) + max_wait_seconds ))

          echo "Waiting for ${image_ref}..."

          while true; do
            if docker manifest inspect "${image_ref}" >/dev/null 2>&1; then
              echo "Found ${image_ref}"
              break
            fi

            now="$(date +%s)"
            if [ "${now}" -ge "${deadline}" ]; then
              echo "Timed out waiting for ${image_ref} after ${max_wait_seconds}s." >&2
              exit 1
            fi

            remaining="$(( deadline - now ))"
            echo "Still waiting for ${image_ref} (${remaining}s remaining)..."
            sleep "${poll_interval_seconds}"
          done

      - name: Set Up Helm
        uses: azure/setup-helm@v4

      - name: Prepare Chart Release Workspace
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail

          rm -rf .chart-build
          mkdir -p .chart-build
          cp -R charts/claude-oauth-proxy .chart-build/claude-oauth-proxy

          chart_yaml=".chart-build/claude-oauth-proxy/Chart.yaml"
          values_yaml=".chart-build/claude-oauth-proxy/values.yaml"

          # Stamp Chart.yaml with release version and appVersion.
          sed -i "s/^version:.*$/version: ${RELEASE_TAG}/" "${chart_yaml}"
          sed -i "s/^appVersion:.*$/appVersion: \"${RELEASE_TAG}\"/" "${chart_yaml}"

          # Stamp values.yaml image tag.
          sed -i "s/^  tag:.*$/  tag: ${RELEASE_TAG}/" "${values_yaml}"

          echo "Stamped chart: version=${RELEASE_TAG}, appVersion=${RELEASE_TAG}, image.tag=${RELEASE_TAG}"
          grep -E '^(version|appVersion):' "${chart_yaml}"
          grep '  tag:' "${values_yaml}"

      - name: Lint Release Chart
        run: helm lint .chart-build/claude-oauth-proxy

      - name: Render Release Chart
        run: helm template claude-oauth-proxy .chart-build/claude-oauth-proxy >/dev/null

      - name: Prepare Existing Chart Artifacts
        shell: bash
        run: |
          set -euo pipefail

          rm -rf .chart-repo
          mkdir -p .chart-repo

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch --depth=1 origin gh-pages
            git --work-tree=.chart-repo checkout origin/gh-pages -- .
          fi

          # Keep only chart repository artifacts on gh-pages.
          find .chart-repo -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '*.tgz' \
            ! -name 'index.yaml' \
            ! -name '.nojekyll' \
            -exec rm -rf {} +

      - name: Package Chart and Build Index
        shell: bash
        run: |
          set -euo pipefail

          helm package .chart-build/claude-oauth-proxy --destination .chart-repo

          if [ -f .chart-repo/index.yaml ]; then
            helm repo index .chart-repo \
              --url "${{ steps.meta.outputs.helm_repo_url }}" \
              --merge .chart-repo/index.yaml
          else
            helm repo index .chart-repo --url "${{ steps.meta.outputs.helm_repo_url }}"
          fi

          touch .chart-repo/.nojekyll

      - name: Publish Chart Artifacts
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .chart-repo
          keep_files: false
          enable_jekyll: false
          commit_message: "chore(helm): publish chart for ${{ steps.meta.outputs.release_tag }}"
