name: Container

on:
  push:
    branches:
      - "**"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Build Variables
        id: vars
        run: |
          set -euo pipefail

          image_repo="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${GITHUB_REPOSITORY#*/}"

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            if [[ "${version}" == v* ]]; then
              echo "Release tags must be plain semantic versions without a v prefix." >&2
              exit 1
            fi
            if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use semantic versioning, for example 1.2.3 or 1.2.3-rc.1." >&2
              exit 1
            fi

            tags="${image_repo}:${version}\n${image_repo}:latest"
            version_label="${version}"
          else
            version="${GITHUB_REF_NAME:-dev}"
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              channel="nightly"
            else
              channel="develop"
            fi
            tags="${image_repo}:${channel}\n${image_repo}:${channel}-${GITHUB_SHA::7}"
            version_label="${channel}-${GITHUB_SHA::7}"
          fi

          {
            echo "short_sha=${GITHUB_SHA::7}"
            echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "version=${version}"
            echo "version_label=${version_label}"
            echo "tags<<EOF"
            printf '%b\n' "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version_label }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            COMMIT_SHORT=${{ steps.vars.outputs.short_sha }}
            BUILT_AT=${{ steps.vars.outputs.built_at }}
