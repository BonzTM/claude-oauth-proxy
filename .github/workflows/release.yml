name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate Release Version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.release.tag_name }}"
          if [[ "${version}" == v* ]]; then
            echo "Release tags must be plain semantic versions without a v prefix." >&2
            exit 1
          fi
          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must use semantic versioning, for example 1.2.3 or 1.2.3-rc.1." >&2
            exit 1
          fi

      - name: Build Cross Platform Binaries
        run: |
          mkdir -p dist
          short_sha="${GITHUB_SHA::7}"
          built_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          version="${{ github.event.release.tag_name }}"

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            suffix=""
            if [ "$goos" = "windows" ]; then
              suffix=".exe"
            fi

            output="dist/claude-oauth-proxy_${goos}_${goarch}${suffix}"
            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "-s -w -X github.com/bonztm/claude-oauth-proxy/internal/buildinfo.version=${version} -X github.com/bonztm/claude-oauth-proxy/internal/buildinfo.commitShort=${short_sha} -X github.com/bonztm/claude-oauth-proxy/internal/buildinfo.builtAt=${built_at}" -o "$output" ./cmd/claude-oauth-proxy
          done

          sha256sum dist/* > dist/sha256sums.txt

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: claude-oauth-proxy-release-binaries
          path: dist/
          if-no-files-found: error

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
