name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
    - type: markdown
      attributes:
          value: |
              Thanks for taking the time to report a bug. Please fill out the information below to help us diagnose and fix the issue.

    - type: textarea
      id: description
      attributes:
          label: Bug Description
          description: A clear and concise description of what the bug is.
          placeholder: Describe the bug...
      validations:
          required: true

    - type: textarea
      id: reproduction
      attributes:
          label: Steps to Reproduce
          description: Step-by-step instructions to reproduce the behavior.
          placeholder: |
              1. Start the proxy with '...'
              2. Send a request to '...'
              3. See error
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: What did you expect to happen?
          placeholder: Describe what should have happened...
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: What actually happened?
          placeholder: Describe what actually happened...
      validations:
          required: true

    - type: input
      id: version
      attributes:
          label: claude-oauth-proxy Version
          description: What version are you running? (image tag, commit hash, or `claude-oauth-proxy version` output)
          placeholder: "e.g., latest, nightly-abc1234, or v0.1.0"
      validations:
          required: true

    - type: dropdown
      id: deployment
      attributes:
          label: Deployment Method
          description: How are you running the proxy?
          options:
              - Docker Compose
              - Helm / Kubernetes
              - Local binary
              - Other
      validations:
          required: true

    - type: input
      id: client
      attributes:
          label: Client Application
          description: What OpenAI-compatible client are you using?
          placeholder: "e.g., opencode, aider, Continue, curl, Python OpenAI SDK"
      validations:
          required: false

    - type: textarea
      id: logs
      attributes:
          label: Relevant Logs
          description: Please copy and paste any relevant log output. This will be automatically formatted into code.
          render: shell
      validations:
          required: false

    - type: checkboxes
      id: checklist
      attributes:
          label: Checklist
          options:
              - label: I have searched existing issues to ensure this bug hasn't already been reported
                required: true
