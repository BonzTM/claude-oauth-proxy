{{- include "claude-oauth-proxy.validate" . }}
{{- if and (not .Values.config.apiKey.existingSecret.name) (not (hasKey .Values.config.extraEnv "CLAUDE_OAUTH_PROXY_API_KEY")) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-oauth-proxy.apiKeySecretName" . }}
  labels:
    {{- include "claude-oauth-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.config.apiKey.value | quote }}
{{- end }}
